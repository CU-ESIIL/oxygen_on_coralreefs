name: Download File Directly
on:
  workflow_dispatch: # Allows you to run this manually with a single click

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download file from website
        run: |
          # Replace the URL with your target file's URL and name your output file
          curl -L "https://www.ncei.noaa.gov/archive/accession/download/12632" -o "https://github.com/CU-ESIIL/oxygen_on_coralreefs/tree/main/data/LTM_FlowerGardens2002-2006.zip"

      - name: Commit and push directly to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41974232+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Downloaded file directly from website" || exit 0
          git push
